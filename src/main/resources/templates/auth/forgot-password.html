<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en">

<head>
    <title>Forgot Password | RevShop</title>
    <th:block th:replace="~{fragments/layout :: head-common}" />
</head>

<body>

    <div class="auth-page">
        <div class="auth-card">
            <div class="auth-header">
                <img th:src="@{/images/logo.png}" alt="RevShop Logo" class="auth-logo-img">
                <h1>Forgot Password</h1>
                <p id="auth-desc">Enter your email to answer your security question</p>
            </div>

            <div id="recovery-error" class="alert alert-danger" style="display:none;"></div>
            <div id="recovery-success" class="alert alert-success" style="display:none;"></div>

            <!-- Step 1: Email -->
            <form id="step-1-form" onsubmit="return handleGetQuestion(event)">
                <div class="form-group">
                    <label for="email">Email Address</label>
                    <input type="email" id="email" name="email" class="form-control" placeholder="you@example.com"
                        required>
                </div>
                <button type="submit" class="btn btn-primary btn-block btn-lg" id="btn-next">
                    Next
                </button>
            </form>

            <!-- Step 2: Answer Verification -->
            <form id="step-2-form" onsubmit="return handleVerify(event)" style="display:none;">
                <div class="form-group">
                    <label>Security Question</label>
                    <p id="display-question" style="font-weight: 500; color: #007bff; margin-bottom: 5px;"></p>
                </div>
                <div class="form-group">
                    <label for="answer">Security Answer</label>
                    <input type="text" id="answer" name="answer" class="form-control" placeholder="Your answer"
                        required>
                </div>
                <button type="submit" class="btn btn-primary btn-block btn-lg" id="btn-verify">
                    Verify Answer
                </button>
            </form>

            <!-- Step 3: New Password -->
            <form id="step-3-form" onsubmit="return handleReset(event)" style="display:none;">
                <div class="form-group">
                    <label for="newPassword">New Password</label>
                    <input type="password" id="newPassword" name="newPassword" class="form-control"
                        placeholder="••••••••" required minlength="6">
                </div>
                <div class="form-group">
                    <label for="confirmPassword">Confirm New Password</label>
                    <input type="password" id="confirmPassword" name="confirmPassword" class="form-control"
                        placeholder="••••••••" required minlength="6">
                </div>
                <button type="submit" class="btn btn-primary btn-block btn-lg" id="btn-reset">
                    Reset Password
                </button>
            </form>

            <p
                style="text-align:center; margin-top:var(--space-xl); color:var(--text-muted); font-size:var(--font-size-sm);">
                Remember your password? <a th:href="@{/login}">Sign in</a>
            </p>
        </div>
    </div>

    <script th:src="@{/js/app.js}"></script>
    <script>
        let currentUserEmail = '';
        let currentAnswer = '';

        async function handleGetQuestion(e) {
            e.preventDefault();
            const email = document.getElementById('email').value.trim();
            const errorDiv = document.getElementById('recovery-error');
            const btn = document.getElementById('btn-next');

            errorDiv.style.display = 'none';
            btn.textContent = 'Loading...';
            btn.disabled = true;

            try {
                const res = await RevShop.getSecurityQuestion(email);
                if (res.success && res.data) {
                    currentUserEmail = email;
                    document.getElementById('display-question').textContent = res.data;
                    document.getElementById('step-1-form').style.display = 'none';
                    document.getElementById('step-2-form').style.display = 'block';
                    document.getElementById('auth-desc').textContent = 'Answer the question to reset your password';
                }
            } catch (err) {
                errorDiv.textContent = err.message || 'Error fetching security question';
                errorDiv.style.display = 'flex';
            } finally {
                btn.textContent = 'Next';
                btn.disabled = false;
            }
            return false;
        }

        async function handleVerify(e) {
            e.preventDefault();
            currentAnswer = document.getElementById('answer').value.trim();

            // We move to step 3 directly. Verification will happen during final reset on backend
            // but we can do a quick local check if we wanted. 
            document.getElementById('step-2-form').style.display = 'none';
            document.getElementById('step-3-form').style.display = 'block';
            document.getElementById('auth-desc').textContent = 'Enter your new password below';

            return false;
        }

        async function handleReset(e) {
            e.preventDefault();
            const newPassword = document.getElementById('newPassword').value;
            const confirmPassword = document.getElementById('confirmPassword').value;

            const errorDiv = document.getElementById('recovery-error');
            const successDiv = document.getElementById('recovery-success');
            const btn = document.getElementById('btn-reset');

            errorDiv.style.display = 'none';
            successDiv.style.display = 'none';

            if (newPassword !== confirmPassword) {
                errorDiv.textContent = 'Passwords do not match';
                errorDiv.style.display = 'flex';
                return false;
            }

            btn.textContent = 'Resetting...';
            btn.disabled = true;

            try {
                await RevShop.resetPassword({
                    email: currentUserEmail,
                    securityAnswer: currentAnswer,
                    newPassword: newPassword,
                    confirmPassword: confirmPassword
                });

                successDiv.textContent = 'Password reset successfully! Redirecting to login...';
                successDiv.style.display = 'flex';
                document.getElementById('step-3-form').style.display = 'none';

                setTimeout(() => { window.location.href = '/login?reset=success'; }, 2000);
            } catch (err) {
                errorDiv.textContent = err.message || 'Invalid security answer or error';
                errorDiv.style.display = 'flex';
                // If it was an invalid answer, allow going back or staying? 
                // For simplicity, we stay on this step but show the error.
            } finally {
                btn.textContent = 'Reset Password';
                btn.disabled = false;
            }
            return false;
        }
    </script>
</body>

</html>
