<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en">

<head>
    <title>Reset Password | RevShop</title>
    <th:block th:replace="~{fragments/layout :: head-common}" />
</head>

<body>

    <div class="auth-page">
        <div class="auth-card">
            <div class="auth-header">
                <img th:src="@{/images/logo.png}" alt="RevShop Logo" class="auth-logo-img">
                <h1>Reset Password</h1>
                <p>Enter your recovery token and new password</p>
            </div>

            <div id="reset-error" class="alert alert-danger" style="display:none;"></div>
            <div id="reset-success" class="alert alert-success" style="display:none;"></div>

            <form id="reset-form" onsubmit="return handleReset(event)">
                <div class="form-group">
                    <label for="token">Recovery Token</label>
                    <input type="text" id="token" name="token" class="form-control"
                        placeholder="Paste your recovery token" required>
                </div>
                <div class="form-group">
                    <label for="newPassword">New Password</label>
                    <input type="password" id="newPassword" name="newPassword" class="form-control"
                        placeholder="Enter new password" required>
                </div>
                <div class="form-group">
                    <label for="confirmPassword">Confirm Password</label>
                    <input type="password" id="confirmPassword" name="confirmPassword" class="form-control"
                        placeholder="Re-enter new password" required>
                </div>
                <button type="submit" class="btn btn-primary btn-block btn-lg" id="btn-submit-reset">
                    Reset Password
                </button>
            </form>

            <p
                style="text-align:center; margin-top:var(--space-xl); color:var(--text-muted); font-size:var(--font-size-sm);">
                <a th:href="@{/login}">Back to Sign In</a>
            </p>
        </div>
    </div>

    <script th:src="@{/js/app.js}"></script>
    <script>
        async function handleReset(e) {
            e.preventDefault();
            const token = document.getElementById('token').value;
            const newPassword = document.getElementById('newPassword').value;
            const confirmPassword = document.getElementById('confirmPassword').value;
            const errorDiv = document.getElementById('reset-error');
            const successDiv = document.getElementById('reset-success');
            const btn = document.getElementById('btn-submit-reset');

            errorDiv.style.display = 'none';
            successDiv.style.display = 'none';

            if (newPassword !== confirmPassword) {
                errorDiv.textContent = 'Passwords do not match';
                errorDiv.style.display = 'flex';
                return false;
            }

            btn.textContent = 'Resetting...';
            btn.disabled = true;

            try {
                const res = await RevShop.resetPassword(token, newPassword);
                successDiv.textContent = 'Password reset successfully! Redirecting to login...';
                successDiv.style.display = 'flex';
                setTimeout(() => { window.location.href = '/login'; }, 2000);
            } catch (err) {
                errorDiv.textContent = err.message || 'Failed to reset password';
                errorDiv.style.display = 'flex';
            } finally {
                btn.textContent = 'Reset Password';
                btn.disabled = false;
            }
            return false;
        }
    </script>
</body>

</html>
