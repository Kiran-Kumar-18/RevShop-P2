<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en">

<head>
    <title>Contact Us | RevShop Help</title>
    <th:block th:replace="~{fragments/layout :: head-common}" />
</head>

<body>
    <th:block th:replace="~{fragments/layout :: navbar}" />

    <main class="page-content">
        <div class="container">
            <div class="page-header" style="text-align: center; margin-bottom: var(--space-2xl);">
                <h1>Contact Us</h1>
                <p>We're here to help you with any questions or concerns</p>
            </div>

            <div class="grid"
                style="display: grid; grid-template-columns: repeat(auto-fit, minmax(300px, 1fr)); gap: var(--space-xl);">
                <!-- Support Info -->
                <div class="card">
                    <div class="card-body">
                        <h2 style="margin-bottom: var(--space-lg);">Support Information</h2>
                        <div style="margin-bottom: var(--space-md);">
                            <h4 style="color: var(--primary-light);">📧 Email Support</h4>
                            <p style="color: var(--text-secondary);">kkirankumar2727@gmail.com</p>
                        </div>
                        <div style="margin-bottom: var(--space-md);">
                            <h4 style="color: var(--primary-light);">📞 Phone Support</h4>
                            <p style="color: var(--text-secondary);">+91 8919571170</p>
                        </div>
                        <div style="margin-bottom: var(--space-md);">
                            <h4 style="color: var(--primary-light);">📍 Office Address</h4>
                            <p style="color: var(--text-secondary);">Hyderabad,<br>MLRIT</p>
                        </div>
                    </div>
                </div>

                <!-- Contact Form -->
                <div class="card">
                    <div class="card-body">
                        <h2 style="margin-bottom: var(--space-lg);">Send a Message</h2>
                        <form id="contact-form"
                            onsubmit="event.preventDefault(); RevShop.showToast('Message sent! Our team will get back to you soon.', 'success'); this.reset();">
                            <div class="form-group">
                                <label for="contact-name">Name</label>
                                <input type="text" id="contact-name" class="form-control" placeholder="Your Name"
                                    required>
                            </div>
                            <div class="form-group">
                                <label for="contact-email">Email</label>
                                <input type="email" id="contact-email" class="form-control" placeholder="your@email.com"
                                    required>
                            </div>
                            <div class="form-group">
                                <label for="contact-subject">Subject</label>
                                <select id="contact-subject" class="form-control">
                                    <option value="General Inquiry">General Inquiry</option>
                                    <option value="Order Issue">Order Issue</option>
                                    <option value="Seller Application">Seller Application</option>
                                    <option value="Technical Support">Technical Support</option>
                                </select>
                            </div>
                            <div class="form-group">
                                <label for="contact-message">Message</label>
                                <textarea id="contact-message" class="form-control" rows="5"
                                    placeholder="How can we help?" required></textarea>
                            </div>
                            <button type="submit" class="btn btn-primary btn-block">Send Message</button>
                        </form>
                    </div>
                </div>
            </div>
        </div>
    </main>

    <th:block th:replace="~{fragments/layout :: footer}" />
    <th:block th:replace="~{fragments/layout :: scripts}" />
</body>

</html>
