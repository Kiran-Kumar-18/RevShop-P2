<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en">

<head>
  <title>My Orders | RevShop</title>
  <th:block th:replace="~{fragments/layout :: head-common}" />
</head>

<body>

  <th:block th:replace="~{fragments/layout :: navbar}" />

  <main class="page-content">
    <div class="container">
      <div class="section-header">
        <h1>My Orders</h1>
        <p>Track your purchase history</p>
      </div>

      <div id="orders-list">
        <p>Loading your orders...</p>
      </div>

      <!-- Pagination container -->
      <div id="orders-pagination" class="text-center mt-4" style="display: flex; gap: 5px; justify-content: center;">
      </div>
    </div>
  </main>

  <th:block th:replace="~{fragments/layout :: footer}" />
  <th:block th:replace="~{fragments/layout :: scripts}" />

  <script>
    async function loadOrders(page = 0) {
      const user = RevShop.getUserInfo();
      if (!user) { window.location.href = '/login'; return; }

      const container = document.getElementById('orders-list');

      try {
        const res = await RevShop.getUserOrders(user.userId, page);
        if (res.success && res.data && res.data.content && res.data.content.length > 0) {
          container.innerHTML = `
                        <div class="table-responsive">
                            <table>
                                <thead>
                                    <tr>
                                        <th>Order ID</th>
                                        <th>Date</th>
                                        <th>Total Amount</th>
                                        <th>Status</th>
                                        <th>Action</th>
                                    </tr>
                                </thead>
                                <tbody>
                                    ${res.data.content.map(order => `
                                        <tr>
                                            <td>#${order.orderId}</td>
                                            <td>${new Date(order.orderDate).toLocaleDateString()}</td>
                                            <td><strong>${RevShop.formatCurrency(order.totalAmount)}</strong></td>
                                            <td>${RevShop.getStatusBadge(order.status)}</td>
                                            <td>
                                                <a href="${window.location.pathname}/${order.orderId}" class="btn btn-secondary btn-sm">View Details</a>
                                                ${['PENDING', 'PAID', 'PROCESSING', 'SHIPPED'].includes(order.status) ? `
                                                    <button onclick="cancelOrder(${order.orderId})" class="btn btn-secondary btn-sm" style="margin-left:5px;">Cancel</button>
                                                ` : ''}
                                                ${order.status === 'DELIVERED' ? `
                                                    <button onclick="returnOrder(${order.orderId})" class="btn btn-secondary btn-sm" style="margin-left:5px;">Return</button>
                                                ` : ''}
                                            </td>
                                        </tr>
                                    `).join('')}
                                </tbody>
                            </table>
                        </div>
                    `;

          // Simple Pagination
          const pagination = document.getElementById('orders-pagination');
          if (res.data.totalPages > 1) {
            let html = '';
            for (let i = 0; i < res.data.totalPages; i++) {
              html += `<button class="btn btn-sm ${i === page ? 'btn-primary' : 'btn-outline'}" onclick="loadOrders(${i})">${i + 1}</button>`;
            }
            pagination.innerHTML = html;
          }
        } else {
          container.innerHTML = '<div class="text-center" style="padding:40px;"><h3>No orders found.</h3><a href="/products" class="btn btn-primary">Start Shopping</a></div>';
        }
      } catch (err) {
        container.innerHTML = '<p>Error loading orders.</p>';
      }
    }

    async function cancelOrder(orderId) {
      if (!confirm('Are you sure you want to cancel this order?')) return;
      try {
        const res = await RevShop.updateOrderStatus(orderId, 'CANCELLED');
        if (res.success) {
          RevShop.showToast('Order cancelled successfully', 'info');
          loadOrders(); // Refresh the list
        }
      } catch (err) {
        RevShop.showToast(err.message, 'danger');
      }
    }

    async function returnOrder(orderId) {
      if (!confirm('Are you sure you want to return this order? This action cannot be undone.')) return;
      try {
        const res = await RevShop.updateOrderStatus(orderId, 'RETURNED');
        if (res.success) {
          RevShop.showToast('Order returned successfully', 'success');
          loadOrders(); // Refresh the list
        }
      } catch (err) {
        RevShop.showToast(err.message, 'danger');
      }
    }

    document.addEventListener('DOMContentLoaded', () => loadOrders(0));
  </script>
</body>

</html>
